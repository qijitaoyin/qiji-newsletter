name: Deploy to GitHub Pages

on:
  workflow_dispatch:
    inputs:
      run_ai:
        description: "Generate AI quotes and tags before build"
        required: true
        default: "false"
        type: choice
        options:
          - "false"
          - "true"
      ai_issue_id:
        description: "Issue id for AI metadata, or latest"
        required: true
        default: "latest"
      ai_limit:
        description: "Limit AI articles; 0 means no limit"
        required: true
        default: "0"

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    env:
      RCLONE_CONFIG_CONTENT: ${{ secrets.RCLONE_CONFIG }}
      GOOGLE_DRIVE_REMOTE: ${{ vars.GOOGLE_DRIVE_REMOTE }}
      OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
      OPENAI_MODEL: ${{ vars.OPENAI_MODEL }}
      AI_ISSUE_ID: ${{ inputs.ai_issue_id }}
      AI_LIMIT: ${{ inputs.ai_limit }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Install rclone when Google Drive secret exists
        if: ${{ env.RCLONE_CONFIG_CONTENT != '' }}
        run: |
          curl https://rclone.org/install.sh | sudo bash
          mkdir -p ~/.config/rclone
          printf '%s' "$RCLONE_CONFIG_CONTENT" > ~/.config/rclone/rclone.conf

      - name: Sync Google Drive source
        if: ${{ env.RCLONE_CONFIG_CONTENT != '' && env.GOOGLE_DRIVE_REMOTE != '' }}
        shell: pwsh
        run: ./scripts/sync_google_drive.ps1

      - name: Generate article data
        shell: pwsh
        run: |
          if ($env:GOOGLE_DRIVE_REMOTE) {
            ./scripts/generate_archive.ps1
          } else {
            Write-Host "No Google Drive remote configured; using committed generated data."
          }

      - name: Generate AI metadata
        if: ${{ inputs.run_ai == 'true' && env.OPENAI_API_KEY != '' }}
        run: pnpm ai:metadata

      - name: Build
        run: pnpm build

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: dist

      - name: Upload import reports
        uses: actions/upload-artifact@v4
        with:
          name: qiji-newsletter-reports
          path: reports

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
