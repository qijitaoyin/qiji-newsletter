name: Deploy to GitHub Pages

on:
  workflow_dispatch:
    inputs:
      run_ai:
        description: "Generate AI metadata before build"
        required: true
        default: "false"
        type: choice
        options:
          - "false"
          - "true"
      paid_ai_confirm:
        description: "Allow paid AI API calls for missing/changed metadata"
        required: true
        default: "false"
        type: choice
        options:
          - "false"
          - "true"
      ai_issue_id:
        description: "Issue id for AI metadata, or latest"
        required: true
        default: "latest"
      ai_limit:
        description: "Limit AI articles; 0 means no limit"
        required: true
        default: "0"
      sync_drive:
        description: "Sync Google Drive before build"
        required: true
        default: "true"
        type: choice
        options:
          - "true"
          - "false"
      review_publish_json:
        description: "Optional JSON copied from /review/ publish confirmation"
        required: false
        default: ""

permissions:
  contents: write
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    env:
      RCLONE_CONFIG_CONTENT: ${{ secrets.RCLONE_CONFIG }}
      GOOGLE_DRIVE_REMOTE: ${{ vars.GOOGLE_DRIVE_REMOTE }}
      KIMI_API_KEY: ${{ secrets.KIMI_API_KEY }}
      OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
      AI_PROVIDER: ${{ vars.AI_PROVIDER }}
      AI_API_BASE_URL: ${{ vars.AI_API_BASE_URL }}
      AI_MODEL: ${{ vars.AI_MODEL }}
      OPENAI_MODEL: ${{ vars.OPENAI_MODEL }}
      AI_ALLOW_PAID_API: ${{ inputs.run_ai == 'true' && inputs.paid_ai_confirm == 'true' && 'true' || 'false' }}
      AI_ISSUE_ID: ${{ inputs.ai_issue_id }}
      AI_LIMIT: ${{ inputs.ai_limit }}
      PUBLIC_SITE_URL: https://newsletter.qiji.org.tw
      PUBLIC_BASE_PATH: /
      PUBLIC_REVIEW_PUBLISH_WEBHOOK_URL: ${{ vars.REVIEW_PUBLISH_WEBHOOK_URL }}
      REVIEW_PUBLISH_JSON: ${{ inputs.review_publish_json }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Restore import cache
        uses: actions/cache@v4
        with:
          path: |
            .cache
            各期電子報
            public/assets/articles
          key: qiji-import-cache-${{ runner.os }}-${{ github.ref_name }}-${{ github.run_id }}
          restore-keys: |
            qiji-import-cache-${{ runner.os }}-${{ github.ref_name }}-
            qiji-import-cache-${{ runner.os }}-

      - name: Install rclone when Google Drive secret exists
        if: ${{ env.RCLONE_CONFIG_CONTENT != '' }}
        run: |
          curl https://rclone.org/install.sh | sudo bash
          mkdir -p ~/.config/rclone
          printf '%s' "$RCLONE_CONFIG_CONTENT" > ~/.config/rclone/rclone.conf

      - name: Sync Google Drive source
        if: ${{ inputs.sync_drive == 'true' && env.RCLONE_CONFIG_CONTENT != '' && env.GOOGLE_DRIVE_REMOTE != '' }}
        timeout-minutes: 60
        shell: pwsh
        run: ./scripts/sync_google_drive.ps1

      - name: Generate article data
        shell: pwsh
        run: |
          if ("${{ inputs.sync_drive }}" -eq "true" -and $env:GOOGLE_DRIVE_REMOTE) {
            ./scripts/generate_archive.ps1
          } else {
            Write-Host "No Google Drive remote configured; using committed generated data."
          }

      - name: Generate AI metadata
        if: ${{ inputs.run_ai == 'true' && inputs.paid_ai_confirm == 'true' && (env.KIMI_API_KEY != '' || env.OPENAI_API_KEY != '') }}
        run: pnpm ai:metadata

      - name: Persist AI metadata
        if: ${{ inputs.run_ai == 'true' && inputs.paid_ai_confirm == 'true' && (env.KIMI_API_KEY != '' || env.OPENAI_API_KEY != '') }}
        run: |
          if git diff --quiet -- src/data/aiMetadata.json; then
            echo "AI metadata unchanged."
            exit 0
          fi

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add src/data/aiMetadata.json
          git commit -m "Update AI metadata"
          git push

      - name: Apply review publish confirmation
        if: ${{ inputs.review_publish_json != '' }}
        shell: pwsh
        run: |
          $payload = [string]$env:REVIEW_PUBLISH_JSON
          try {
            $payload | ConvertFrom-Json | Out-Null
            Set-Content -LiteralPath review-publish.json -Value $payload -Encoding UTF8
            Write-Host "Using review publish JSON from workflow input."
          } catch {
            if (Test-Path -LiteralPath review-publish.json) {
              Write-Warning "Workflow input was not valid JSON; using committed review-publish.json instead."
            } else {
              throw
            }
          }

          ./scripts/apply_review_publish.ps1 -PublishFile review-publish.json

      - name: Persist review publish state
        if: ${{ inputs.review_publish_json != '' }}
        run: |
          if git diff --quiet -- review-publish.json src/data/editorialOverrides.json src/data/publishState.json; then
            echo "Review publish state unchanged."
            exit 0
          fi

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add review-publish.json src/data/editorialOverrides.json src/data/publishState.json
          git commit -m "Publish reviewed issue"
          git push

      - name: Build
        run: pnpm build

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: dist

      - name: Upload import reports
        uses: actions/upload-artifact@v4
        with:
          name: qiji-newsletter-reports
          path: reports

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
