name: Build newsletter site

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:
  schedule:
    - cron: "0 20 * * *"

jobs:
  build:
    runs-on: ubuntu-latest
    env:
      RCLONE_CONFIG_CONTENT: ${{ secrets.RCLONE_CONFIG }}
      GOOGLE_DRIVE_REMOTE: ${{ vars.GOOGLE_DRIVE_REMOTE }}
    permissions:
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Install rclone when Google Drive secret exists
        if: ${{ env.RCLONE_CONFIG_CONTENT != '' }}
        run: |
          curl https://rclone.org/install.sh | sudo bash
          mkdir -p ~/.config/rclone
          printf '%s' "$RCLONE_CONFIG_CONTENT" > ~/.config/rclone/rclone.conf

      - name: Sync Google Drive source
        if: ${{ env.RCLONE_CONFIG_CONTENT != '' && env.GOOGLE_DRIVE_REMOTE != '' }}
        shell: pwsh
        run: ./scripts/sync_google_drive.ps1

      - name: Generate article data
        shell: pwsh
        run: |
          if ($env:GOOGLE_DRIVE_REMOTE) {
            ./scripts/generate_archive.ps1
          } else {
            Write-Host "No local article source folder found; using committed generated data."
          }

      - name: Build
        run: pnpm build

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: qiji-newsletter-dist
          path: dist

      - name: Upload validation reports
        uses: actions/upload-artifact@v4
        with:
          name: qiji-newsletter-import-reports
          path: reports
